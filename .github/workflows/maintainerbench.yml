name: MaintainerBench

on:
  pull_request:
  workflow_dispatch:

jobs:
  maintainerbench:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build MaintainerBench packages
        run: pnpm build

      - name: Run MaintainerBench lint
        uses: ./packages/github-action
        with:
          mode: lint
          fail-on: high

      - name: Create release package
        if: github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p release
          tar -czf release/maintainerbench-build-${GITHUB_RUN_NUMBER}.tar.gz \
            package.json \
            pnpm-workspace.yaml \
            README.md \
            LICENSE \
            AGENTS.md \
            packages \
            templates \
            docs \
            examples

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          target_commitish: ${{ github.sha }}
          name: MaintainerBench build ${{ github.run_number }}
          generate_release_notes: true
          files: release/maintainerbench-build-${{ github.run_number }}.tar.gz
          overwrite_files: true