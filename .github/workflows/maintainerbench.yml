name: MaintainerBench

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  maintainerbench:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build MaintainerBench packages
        run: pnpm build

      - name: Run MaintainerBench lint
        uses: ./packages/github-action
        with:
          mode: lint
          fail-on: high

      - name: Create release package
        run: |
          mkdir -p release
          tar -czf release/maintainerbench-${GITHUB_SHA}.tar.gz \
            package.json \
            pnpm-workspace.yaml \
            README.md \
            LICENSE \
            AGENTS.md \
            packages \
            templates \
            docs \
            examples

      # 配置 git 用户
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 创建并推送标签
      - name: Create a tag for the release
        run: |
          VERSION="v${GITHUB_SHA:0:7}"
          git tag $VERSION
          git push origin $VERSION
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/maintainerbench-${{ github.sha }}.tar.gz