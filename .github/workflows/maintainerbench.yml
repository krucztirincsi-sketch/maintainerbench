name: MaintainerBench

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  maintainerbench:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build MaintainerBench packages
        run: pnpm build

      - name: Run MaintainerBench lint
        uses: ./packages/github-action
        with:
          mode: lint
          fail-on: high

      # 创建发布文件
      - name: Create release package
        run: |
          mkdir -p release
          tar -czf release/maintainerbench-${GITHUB_SHA}.tar.gz \
            package.json \
            pnpm-workspace.yaml \
            README.md \
            LICENSE \
            AGENTS.md \
            packages \
            templates \
            docs \
            examples

      # 自动创建标签并推送
      - name: Create a tag for the release
        run: |
          VERSION="v${GITHUB_SHA:0:7}"  # 使用 commit hash 的前 7 位作为版本号
          git tag $VERSION
          git push origin $VERSION

      # 创建 GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/maintainerbench-${{ github.sha }}.tar.gz